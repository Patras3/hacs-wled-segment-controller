apply_effect:
  name: Apply Effect
  description: >
    Apply an effect to WLED segment(s). Select segment entities in Target
    (e.g. WLED Segment 1, Segment 2). Multiple segments supported.
  target:
    entity:
      integration: wled
      domain: light
  fields:
    color:
      name: Color
      description: Primary color for the effect.
      required: false
      selector:
        color_rgb:
    secondary_color:
      name: Secondary Color
      description: Secondary color (used by dual-color effects like Chase, Scan Dual).
      required: false
      selector:
        color_rgb:
    tertiary_color:
      name: Tertiary Color
      description: Third color (used by tri-color effects like Tri Wipe, Traffic Light).
      required: false
      selector:
        color_rgb:
    effect:
      name: Effect
      description: WLED effect to apply.
      required: false
      default: "Solid"
      selector:
        select:
          mode: dropdown
          options:
            - "Solid"
            - "Blink"
            - "Breathe"
            - "Wipe"
            - "Wipe Random"
            - "Random Colors"
            - "Sweep"
            - "Dynamic"
            - "Colorloop"
            - "Rainbow"
            - "Scan"
            - "Scan Dual"
            - "Fade"
            - "Theater"
            - "Theater Rainbow"
            - "Running"
            - "Saw"
            - "Twinkle"
            - "Dissolve"
            - "Sparkle"
            - "Sparkle Dark"
            - "Sparkle+"
            - "Strobe"
            - "Strobe Rainbow"
            - "Strobe Mega"
            - "Blink Rainbow"
            - "Android"
            - "Chase"
            - "Chase Random"
            - "Chase Rainbow"
            - "Chase Flash"
            - "Rainbow Runner"
            - "Colorful"
            - "Traffic Light"
            - "Sweep Random"
            - "Chase 2"
            - "Aurora"
            - "Stream"
            - "Scanner"
            - "Lighthouse"
            - "Fireworks"
            - "Rain"
            - "Fire Flicker"
            - "Gradient"
            - "Loading"
            - "Fairy"
            - "Two Dots"
            - "Fairytwinkle"
            - "Running Dual"
            - "Chase 3"
            - "Tri Wipe"
            - "Tri Fade"
            - "Lightning"
            - "ICU"
            - "Multi Comet"
            - "Dual Scanner"
            - "Stream 2"
            - "Oscillate"
            - "Pride 2015"
            - "Juggle"
            - "Palette"
            - "Fire 2012"
            - "Colorwaves"
