    speed:
      name: Speed
      description: Effect speed.
      required: false
      default: 128
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    intensity:
      name: Intensity
      description: Effect intensity.
      required: false
      default: 128
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    brightness:
      name: Brightness
      description: Segment brightness.
      required: false
      selector:
        number:
          min: 1
          max: 255
          mode: slider
    duration:
      name: Duration
      description: Auto-restore previous state after this many seconds. Leave empty for permanent change.
      required: false
      selector:
        number:
          min: 1
          max: 86400
          unit_of_measurement: seconds
          mode: box

restore_segment:
  name: Restore Segment
  description: >
    Restore segment(s) to state before last effect was applied.
    Select segment entities in Target.
  target:
    entity:
      integration: wled
      domain: light

save_state:
  name: Save State
  description: Save the current state of all segments as a named snapshot.
  target:
    entity:
      integration: wled
      domain: light
  fields:
    name:
      name: Snapshot Name
      description: Name for this snapshot (use to restore later).
      required: true
      example: "before_alarm"
      selector:
        text:

restore_state:
  name: Restore State
  description: Restore a previously saved state snapshot.
  target:
    entity:
      integration: wled
      domain: light
  fields:
    name:
      name: Snapshot Name
      description: Name of the snapshot to restore.
      required: true
      example: "before_alarm"
      selector:
        text:
